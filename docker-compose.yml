services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pgvector_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d pgvector_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@demo.local
      PGADMIN_DEFAULT_PASSWORD: demo
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass
      - pgadmin_data:/var/lib/pgadmin
    entrypoint: >
      /bin/sh -c "
        chmod 600 /pgpass;
        chown pgadmin:pgadmin /pgpass;
        /entrypoint.sh
      "
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/pgvector_demo
      EMBED_DIM: "1024"
    models:
      llm:
        endpoint_var: LLM_URL
        model_var: LLM_MODEL
      embedding:
        endpoint_var: EMBED_URL
        model_var: EMBED_MODEL
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

models:
  llm:
    model: ai/llama3.1:8B-Q4_K_M
  embedding:
    model: ai/mxbai-embed-large

volumes:
  postgres_data:
  pgadmin_data:
