services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pgvector_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d pgvector_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling nomic-embed-text...' &&
        ollama pull nomic-embed-text &&
        echo 'Pulling llama3.2:3b...' &&
        ollama pull llama3.2:3b &&
        echo 'Models ready.'
      "
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/pgvector_demo
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      LLM_MODEL: llama3.2:3b
      EMBED_DIM: "768"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
